min_version = "2024.9.5"

[env]
_.python.venv = { path = ".venv", create = true }
_.file = [".env"]

[tools]
python = "3.11"
uv = "latest"
ruff = "latest"
jq = "latest"
lefthook = "latest"

[tasks.install]
description = "Install all dependencies"
run = "uv sync --all-extras"

[tasks.test]
description = "Run pytest"
run = "uv run pytest"

[tasks.lint]
run = "ruff check --fix ."

[tasks.format]
run = "ruff format ."

[tasks.typecheck]
run = "uvx ty check ."

[tasks.check]
description = "Run all quality checks"
depends = ["format", "lint", "typecheck"]

[tasks.setup]
description = "Initial project setup"
run = """
uv sync --all-extras
lefthook install
"""

[tasks.build]
description = "Build all packages"
run = """
uv build --package prefactor-http
uv build --package prefactor-core
uv build --package prefactor-langchain
"""

[tasks.publish]
description = "Publish all packages to PyPI in dependency order (requires UV_PUBLISH_TOKEN)"
depends = ["build"]
run = """
uv publish dist/prefactor_http-*
uv publish dist/prefactor_core-*
uv publish dist/prefactor_langchain-*
"""

[tasks.publish-test]
description = "Publish all packages to TestPyPI (requires UV_PUBLISH_TOKEN)"
depends = ["build"]
run = """
uv publish --publish-url https://test.pypi.org/legacy/ dist/prefactor_http-*
uv publish --publish-url https://test.pypi.org/legacy/ dist/prefactor_core-*
uv publish --publish-url https://test.pypi.org/legacy/ dist/prefactor_langchain-*
"""

[hooks]
enter = "uv sync --all-extras --quiet"
