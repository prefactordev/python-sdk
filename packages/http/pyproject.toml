[project]
name = "prefactor-http"
version = "0.1.0"
description = "HTTP client library for Prefactor API"
readme = "README.md"
requires-python = ">=3.10.0, <4.0.0"
dependencies = [
    "aiohttp>=3.9.0",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prefactor_http"]
