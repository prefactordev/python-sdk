[project]
name = "prefactor-sdk"
version = "0.2.0"
description = "Prefactor SDK - Automatic observability for LangChain agents"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "prefactor-core>=0.2.0",
    "prefactor-langchain>=0.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prefactor_sdk"]
