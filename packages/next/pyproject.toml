[project]
name = "prefactor-next"
version = "0.1.0"
description = "Next-generation Prefactor SDK with async queue-based operations"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "prefactor-http>=0.1.0",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prefactor_next"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
