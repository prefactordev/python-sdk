[project]
name = "prefactor-livekit"
dynamic = ["version"]
description = "LiveKit Agents integration for Prefactor observability"
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "Prefactor Pty Ltd", email = "josh@prefactor.tech" }
]
requires-python = ">=3.11.0, <4.0.0"
dependencies = [
    "prefactor-core>=0.2.2",
    "livekit-agents~=1.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/prefactor_livekit/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/prefactor_livekit"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
