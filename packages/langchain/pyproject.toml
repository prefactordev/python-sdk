[project]
name = "prefactor-langchain"
version = "0.2.4"
description = "LangChain integration for Prefactor observability"
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "Prefactor Pty Ltd", email = "josh@prefactor.tech" }
]
requires-python = ">=3.11.0, <4.0.0"
dependencies = [
    "prefactor-core>=0.2.2",
    "langchain-core>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prefactor_langchain"]
