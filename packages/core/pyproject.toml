[project]
name = "prefactor-core"
version = "0.2.0"
description = "Core tracing primitives for Prefactor observability"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pfid>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prefactor_core"]
