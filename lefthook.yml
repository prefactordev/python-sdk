pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "*.py"
      run: ruff format {staged_files}
      stage_fixed: true
    ruff-check:
      glob: "*.py"
      run: ruff check --fix {staged_files}
      stage_fixed: true
    ty-check:
      glob: "*.py"
      run: uv run ty check .
